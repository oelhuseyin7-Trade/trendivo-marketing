kind = "web"
previewPath = "/"
title = "Influencer Marketing Agency"
version = "1.0.0"
id = "artifacts/influencer-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20262

[services.development]
run = "pnpm --filter @workspace/influencer-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/influencer-agency", "run", "build" ]
publicDir = "artifacts/influencer-agency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20262"
BASE_PATH = "/"
